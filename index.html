<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prototype Environment</title>
    <link
      rel="stylesheet"
      href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.99/style.min.css"
    />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #e9ecf1;
      }
      #viewer {
        width: 100%;
        height: 100%;
      }
      #status {
        position: fixed;
        left: 12px;
        bottom: 70px;
        padding: 8px 12px;
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.72);
        color: #fff;
        font: 13px/1.4 system-ui, sans-serif;
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="viewer"></div>
    <div id="prototype-strip-root" aria-label="Prototype controls"></div>
    <div id="status">Loading viewer…</div>
    <script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.99/viewer3D.min.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
